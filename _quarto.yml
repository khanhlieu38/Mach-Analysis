project:
  type: website
  output-dir: docs
  render:
    - "**/*.qmd"
    - "!_archive/**"

execute:
  freeze: auto
  echo: false
  warning: false

website:
  title: "MẠCH · Nghiên cứu định tính"
  navbar:
    left:
      - text: "Pre-tour Research 2026"
        menu:
          - text: "Overview"
            file: studies/pretour-research-2026/overview.qmd
          - text: "Mục tiêu nghiên cứu"
            file: studies/pretour-research-2026/purpose.qmd
          - text: "Phương pháp"
            file: studies/pretour-research-2026/methodology.qmd
          - text: "Thông tin dữ liệu"
            file: studies/pretour-research-2026/participants.qmd
          - text: "Phát hiện chính"
            file: studies/pretour-research-2026/findings.qmd
          - text: "Kết luận"
            file: studies/pretour-research-2026/conclusion.qmd
          - text: "Quote Bank"
            file: studies/pretour-research-2026/quote-bank.qmd

format:
  html:
    theme: cosmo
    css: shared/styles.css
    toc: true
    toc-depth: 3
    number-sections: false
    lang: vi
    code-fold: true
    code-summary: "Xem code"
