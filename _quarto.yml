          - text: "Tour Design Team"
            file: studies/pretour-research-2026/audiences/tour-design.qmd
          - text: "Content & Media Team"
            file: studies/pretour-research-2026/audiences/content.qmd
          - text: "Data Team"
            file: studies/pretour-research-2026/audiences/data.qmd
